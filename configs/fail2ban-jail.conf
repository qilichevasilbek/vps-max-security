[DEFAULT]
bantime = ${BAN_DURATION_SECS}
findtime = 600
maxretry = ${MAX_SSH_RETRIES}
# Ban at the DOCKER-USER chain so bans also cover container-published ports.
# If fail2ban's iptables-allports action complains that the chain does not
# exist, apply modules/04-firewall.sh first.
banaction = iptables-allports[chain=DOCKER-USER]
banaction_allports = iptables-allports[chain=DOCKER-USER]
backend = systemd

[sshd]
enabled = true
port = ${SSH_PORT}
filter = sshd
logpath = /var/log/auth.log
maxretry = ${MAX_SSH_RETRIES}
bantime = ${BAN_DURATION_SECS}

# -------- Nginx jails --------
# These assume Nginx logs are accessible on the host, either by running
# Nginx on the host or by bind-mounting /var/log/nginx from the container.

[nginx-http-auth]
enabled = true
port = http,https
filter = nginx-http-auth
logpath = /var/log/nginx/error.log
maxretry = 3

[nginx-botsearch]
enabled = true
port = http,https
filter = nginx-botsearch
logpath = /var/log/nginx/access.log
maxretry = 2

[nginx-badbots]
enabled = true
port = http,https
filter = apache-badbots
logpath = /var/log/nginx/access.log
maxretry = 1
bantime = 604800

[nginx-limit-req]
enabled = true
port = http,https
filter = nginx-limit-req
logpath = /var/log/nginx/error.log
maxretry = 10
findtime = 120

[nginx-4xx-scanner]
enabled = true
port = http,https
filter = nginx-4xx-scanner
logpath = /var/log/nginx/access.log
maxretry = 20
findtime = 300
bantime = 43200

# -------- Django admin brute-force --------
# Requires Django to log failed auth attempts to /var/log/django/auth.log
# (see configs/fail2ban-filters/django-admin.conf for the shim).

[django-admin]
enabled = true
port = http,https
filter = django-admin
logpath = /var/log/django/auth.log
maxretry = 5
findtime = 600
bantime = 86400

# -------- Recidive — repeat offenders get long bans --------
[recidive]
enabled = true
filter = recidive
logpath = /var/log/fail2ban.log
bantime = 2592000
findtime = 604800
maxretry = 3
