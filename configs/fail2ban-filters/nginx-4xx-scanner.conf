# Fail2Ban filter: nginx-4xx-scanner
# Bans hosts that hit many 4xx responses in a short window (bots probing
# for admin panels, PHP files, wp-login, etc.). Tune maxretry/findtime in
# jail.local rather than here.
[Definition]
failregex = ^<HOST> .* "(?:GET|POST|HEAD|PUT|DELETE|OPTIONS) [^"]+" (?:400|401|403|404|405|444) .*$
ignoreregex = .*(robots\.txt|favicon\.ico|apple-touch-icon|\.well-known).*
datepattern = {^LN-BEG}%%ExY(?P<_sep>[-/.])%%m(?P=_sep)%%d[T ]%%H:%%M:%%S(?:[.,]%%f)?(?:\s*%%z)?
            = ^[^\[]*\[({DATE})
            = {^LN-BEG}
