# Fail2Ban filter: django-admin
# Parses Django's auth logger. Requires Django settings.py to route
# `django.security.*` and `django.contrib.auth` to a file handler that
# includes the client IP in the log line as `ip=<HOST>`.
#
# Example Django shim (settings.py):
#   LOGGING = {
#     "version": 1,
#     "handlers": {"auth_file": {"class": "logging.FileHandler",
#                                "filename": "/var/log/django/auth.log"}},
#     "loggers": {
#       "django.security.*":       {"handlers": ["auth_file"], "level": "WARNING"},
#       "django.contrib.auth":     {"handlers": ["auth_file"], "level": "WARNING"},
#     },
#   }
[Definition]
failregex = ^.*WARNING.*Invalid login attempt.*ip=<HOST>.*$
            ^.*django\.security\.SuspiciousOperation.*from <HOST>.*$
            ^.*Authentication failure.*ip=<HOST>.*$
ignoreregex =
