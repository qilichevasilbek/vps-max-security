# vps-max-security — Default configuration
#
# These defaults apply unless overridden by /etc/vps-max-security/config.conf.
# The wizard only asks 3 questions (profile, SSH port, admin user).
# Everything else here is a sane default — edit config.conf to customize.

# ── Profile ──────────────────────────────────────────────────
# "web"      — TCP 80, 443 only (90% of deployments)
# "realtime" — TCP 80, 443 + UDP 3478 + UDP 50000-50100 (WebRTC/VoIP)
# "custom"   — user-specified ports
PROFILE="web"

# ── Ports (derived from profile, or user-specified for custom) ──
PUBLIC_TCP_PORTS="80,443"
PUBLIC_UDP_PORTS=""

# ── SSH ──────────────────────────────────────────────────────
SSH_PORT="2222"
ADMIN_USER="deployer"

# ── Sane defaults (never asked in wizard) ────────────────────
ENABLE_IPV6="false"
DNS_PROVIDER="cloudflare"
MAX_SSH_RETRIES="3"
BAN_DURATION_HOURS="24"
SHM_NOEXEC="false"
RUN_ALL_MODULES="true"

# ── Backward compat (1.x migration) ─────────────────────────
# If your saved config has FIREWALL_PORTS but not PROFILE, it still works.
# The loader auto-migrates: PUBLIC_TCP_PORTS=${FIREWALL_PORTS}
