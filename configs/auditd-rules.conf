## vps-max-security auditd rules — Docker host ruleset
## Adapted from Neo23x0/auditd. Focused on what matters on a Dockerized VPS:
## Docker daemon, identity files, kernel modules, ptrace, mount, rootcmds.

## Delete any pre-existing rules
-D

## Buffer size — raise if you see "lost audit messages" in journal
-b 8192

## Failure mode: 1 = printk panic on audit failure (keep going), 2 = halt
-f 1

## How long to wait for backlog to drain before dropping events
--backlog_wait_time 60000

## ────────────────────────────────────────────────────────────
## Docker daemon & runtimes
## ────────────────────────────────────────────────────────────
-w /usr/bin/dockerd        -p x    -k docker
-w /usr/bin/docker         -p x    -k docker
-w /usr/bin/containerd     -p x    -k docker
-w /usr/bin/containerd-shim-runc-v2 -p x -k docker
-w /usr/bin/runc           -p x    -k docker
-w /usr/sbin/runc          -p x    -k docker

-w /etc/docker             -p wa   -k docker
-w /var/lib/docker         -p wa   -k docker
-w /var/run/docker.sock    -p rwxa -k docker_socket
-w /etc/docker/daemon.json -p wa   -k docker
-w /lib/systemd/system/docker.service -p wa -k docker
-w /lib/systemd/system/docker.socket  -p wa -k docker
-w /etc/default/docker     -p wa   -k docker

## ────────────────────────────────────────────────────────────
## Identity & privilege files
## ────────────────────────────────────────────────────────────
-w /etc/passwd   -p wa -k identity
-w /etc/shadow   -p wa -k identity
-w /etc/group    -p wa -k identity
-w /etc/gshadow  -p wa -k identity
-w /etc/sudoers  -p wa -k sudoers
-w /etc/sudoers.d -p wa -k sudoers

## ────────────────────────────────────────────────────────────
## SSH
## ────────────────────────────────────────────────────────────
-w /etc/ssh/sshd_config   -p wa -k sshd_config
-w /etc/ssh/sshd_config.d -p wa -k sshd_config
-w /root/.ssh             -p wa -k ssh_keys

## ────────────────────────────────────────────────────────────
## Kernel modules (rootkits, container-escape vectors)
## ────────────────────────────────────────────────────────────
-a always,exit -F arch=b64 -S init_module,finit_module,delete_module -F auid!=-1 -k modules
-w /sbin/insmod    -p x -k modules
-w /sbin/rmmod     -p x -k modules
-w /sbin/modprobe  -p x -k modules

## ────────────────────────────────────────────────────────────
## ptrace — code/data/register injection (CVE-class primitives)
## ────────────────────────────────────────────────────────────
-a always,exit -F arch=b64 -S ptrace -F a0=0x4 -k code_injection
-a always,exit -F arch=b64 -S ptrace -F a0=0x5 -k data_injection
-a always,exit -F arch=b64 -S ptrace -F a0=0x6 -k register_injection
-a always,exit -F arch=b64 -S ptrace -k tracing

## ────────────────────────────────────────────────────────────
## Mount syscalls — common container escape TTPs
## ────────────────────────────────────────────────────────────
-a always,exit -F arch=b64 -S mount,umount2 -F auid!=-1 -k mount

## ────────────────────────────────────────────────────────────
## Root command execution by a normal user (sudo/su/exploited svc)
## ────────────────────────────────────────────────────────────
-a always,exit -F arch=b64 -F euid=0 -F auid>=1000 -F auid!=-1 -S execve -k rootcmd
-a always,exit -F arch=b32 -F euid=0 -F auid>=1000 -F auid!=-1 -S execve -k rootcmd

## ────────────────────────────────────────────────────────────
## Critical system config files
## ────────────────────────────────────────────────────────────
-w /etc/hosts       -p wa -k hosts
-w /etc/resolv.conf -p wa -k resolv
-w /etc/crontab     -p wa -k cron
-w /etc/cron.d      -p wa -k cron
-w /etc/cron.hourly -p wa -k cron
-w /etc/cron.daily  -p wa -k cron
-w /etc/network     -p wa -k network

## ────────────────────────────────────────────────────────────
## Login/session log files
## ────────────────────────────────────────────────────────────
-w /var/log/auth.log -p wa -k auth_log
-w /var/log/faillog  -p wa -k login_failure

## Make rules immutable until reboot — uncomment in hardened production.
## (Leave commented during vps-max-security runs so the tool can update rules.)
## -e 2
