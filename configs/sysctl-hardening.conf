#=============================================
# NETWORK SECURITY
#=============================================

# Prevent SYN flood attacks
net.ipv4.tcp_syncookies = 1
net.ipv4.tcp_max_syn_backlog = 2048
net.ipv4.tcp_synack_retries = 2
net.ipv4.tcp_syn_retries = 5

# Reverse path filtering (loose mode for Docker compatibility)
net.ipv4.conf.all.rp_filter = 2
net.ipv4.conf.default.rp_filter = 2

# Disable source routing (prevents spoofing)
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0
net.ipv6.conf.all.accept_source_route = 0

# Disable ICMP redirects (MITM prevention)
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.secure_redirects = 0
net.ipv4.conf.default.secure_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Log suspicious packets (martians)
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# Ignore broadcast ICMP (smurf attack prevention)
net.ipv4.icmp_echo_ignore_broadcasts = 1
net.ipv4.icmp_ignore_bogus_error_responses = 1

# IP forwarding -- required for Docker container networking
net.ipv4.ip_forward = 1

# Reduce TCP FIN timeout (mitigates DDoS)
net.ipv4.tcp_fin_timeout = 15

# Keepalive settings
net.ipv4.tcp_keepalive_time = 600
net.ipv4.tcp_keepalive_intvl = 60
net.ipv4.tcp_keepalive_probes = 3

#=============================================
# KERNEL SECURITY
#=============================================

# Restrict kernel logs to root only
kernel.dmesg_restrict = 1

# Hide kernel pointers from non-root
kernel.kptr_restrict = 2

# Restrict BPF to root (prevents heap spray attacks)
kernel.unprivileged_bpf_disabled = 1
net.core.bpf_jit_harden = 2

# Enable ASLR (Address Space Layout Randomization)
kernel.randomize_va_space = 2

# Restrict ptrace (prevents process snooping)
# 1 = only parent can ptrace children (safe for Docker/debuggers)
# 2 = admin-only (breaks strace, gdb, some monitoring tools)
kernel.yama.ptrace_scope = 1

# Restrict core dumps
fs.suid_dumpable = 0

# User namespaces — required by Docker, Podman, Chrome sandboxing
# Disabling this (=0) breaks container runtimes
# kernel.unprivileged_userns_clone = 0

# Disable SysRq key (prevents console attacks)
kernel.sysrq = 0

# Required for Docker bridge networking
# NOTE: Needs `br_netfilter` kernel module loaded BEFORE systemd-sysctl runs
# or these three keys fail to set on first boot. vps-max-security writes
# /etc/modules-load.d/br_netfilter.conf to ensure this.
net.bridge.bridge-nf-call-iptables = 1
net.bridge.bridge-nf-call-ip6tables = 1
net.bridge.bridge-nf-call-arptables = 1

#=============================================
# FILESYSTEM HARDENING
#=============================================

# Prevent symlink/hardlink attacks (CVE class: /tmp race conditions)
fs.protected_hardlinks = 1
fs.protected_symlinks = 1
fs.protected_fifos = 2
fs.protected_regular = 2

#=============================================
# KERNEL PERF / OBSERVABILITY
#=============================================

# Restrict perf_event_open() to root — prevents non-root side-channel attacks
kernel.perf_event_paranoid = 3

#=============================================
# MUST NOT DISABLE (DOCKER REQUIRES)
#=============================================
# net.ipv4.ip_forward = 1                    (set above)
# net.bridge.bridge-nf-call-iptables = 1     (set above)
# kernel.unprivileged_userns_clone = 1       (Ubuntu 24.04 default — leave alone)
