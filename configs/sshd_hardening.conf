# SSH Cryptographic Hardening — ssh-audit.com A+ profile (April 2026)
#
# Key exchange:
#   sntrup761x25519-sha512@openssh.com — NTRU Prime hybrid PQ KEX (OpenSSH 9.0+)
#   curve25519 / diffie-hellman fallbacks for compatibility.
#
# ML-KEM-768 (mlkem768x25519-sha256) requires OpenSSH 9.9+ and is *prepended*
# to this list at apply time when a new-enough sshd is detected
# (see modules/03-ssh-hardening.sh). Including it unconditionally would make
# OpenSSH 9.6 (Ubuntu 24.04 base) reject the entire KexAlgorithms line.
KexAlgorithms sntrup761x25519-sha512@openssh.com,curve25519-sha256,curve25519-sha256@libssh.org,diffie-hellman-group-exchange-sha256,diffie-hellman-group18-sha512,diffie-hellman-group16-sha512

# Symmetric ciphers — AEAD preferred, CTR fallback
Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com,aes256-ctr,aes192-ctr,aes128-ctr

# Message authentication — encrypt-then-MAC only
MACs hmac-sha2-256-etm@openssh.com,hmac-sha2-512-etm@openssh.com,umac-128-etm@openssh.com

# Host key algorithms — Ed25519 first; FIDO2 hardware key support included
HostKeyAlgorithms sk-ssh-ed25519@openssh.com,ssh-ed25519,rsa-sha2-512,rsa-sha2-256,ssh-ed25519-cert-v01@openssh.com,sk-ssh-ed25519-cert-v01@openssh.com,rsa-sha2-512-cert-v01@openssh.com,rsa-sha2-256-cert-v01@openssh.com

# Public key algorithms accepted from clients
PubkeyAcceptedAlgorithms sk-ssh-ed25519@openssh.com,ssh-ed25519,rsa-sha2-512,rsa-sha2-256,ssh-ed25519-cert-v01@openssh.com,sk-ssh-ed25519-cert-v01@openssh.com,rsa-sha2-512-cert-v01@openssh.com,rsa-sha2-256-cert-v01@openssh.com

# CA signature algorithms (for SSH certificate-based auth)
CASignatureAlgorithms ssh-ed25519,ecdsa-sha2-nistp256,ecdsa-sha2-nistp384,ecdsa-sha2-nistp521,sk-ssh-ed25519@openssh.com,sk-ecdsa-sha2-nistp256@openssh.com,rsa-sha2-512,rsa-sha2-256
